---
# SPDX-License-Identifier: MPL-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Build and test python-nss-ng with NSS/NSPR system dependencies
name: 'Build with NSS/NSPR'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-ubuntu:
    name: 'Build on Ubuntu'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Set up Python ${{ matrix.python-version }}
        # yamllint disable-line rule:line-length
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Setup ccache
        # yamllint disable-line rule:line-length
        uses: hendrikmuhs/ccache-action@bfa03e1de4d7f7c3e80ad9109feedd05c4f5a716
        with:
          # yamllint disable-line rule:line-length
          key: ${{ runner.os }}-py${{ matrix.python-version }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-ccache-
          max-size: 500M

      - name: Install NSS/NSPR system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libnspr4-dev \
            pkg-config
          # Verify installation
          pkg-config --modversion nss || echo "NSS pkg-config not found"
          pkg-config --modversion nspr || echo "NSPR pkg-config not found"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel setuptools-scm

      - name: Configure build environment
        run: |
          echo "CC=ccache gcc" >> "$GITHUB_ENV"
          echo "CXX=ccache g++" >> "$GITHUB_ENV"
          ccache --version
          ccache --zero-stats

      - name: Build source distribution
        run: |
          python -m build --sdist
        continue-on-error: true

      - name: Build wheel
        run: |
          python -m build --wheel
        continue-on-error: true

      - name: Install package
        run: |
          pip install -e ".[test]"
        continue-on-error: true

      - name: Show build info
        if: always()
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== NSS version ==="
          pkg-config --modversion nss || echo "N/A"
          echo "=== NSPR version ==="
          pkg-config --modversion nspr || echo "N/A"
          echo "=== Installed packages ==="
          pip list
          echo "=== ccache statistics ==="
          ccache --show-stats

      - name: Run tests
        if: success()
        run: |
          pytest test/ -v --tb=short
        continue-on-error: true

  build-macos:
    name: 'Build on macOS'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Setup ccache
        # yamllint disable-line rule:line-length
        uses: hendrikmuhs/ccache-action@bfa03e1de4d7f7c3e80ad9109feedd05c4f5a716
        with:
          # yamllint disable-line rule:line-length
          key: ${{ runner.os }}-py${{ matrix.python-version }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-ccache-
          max-size: 500M

      - name: Install NSS/NSPR via Homebrew
        run: |
          brew install nss nspr pkg-config
          # Verify installation
          brew list nss
          brew list nspr
          pkg-config --modversion nss || echo "NSS pkg-config not found"
          pkg-config --modversion nspr || echo "NSPR pkg-config not found"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel setuptools-scm

      - name: Configure build environment
        run: |
          echo "CC=ccache clang" >> "$GITHUB_ENV"
          echo "CXX=ccache clang++" >> "$GITHUB_ENV"
          ccache --version
          ccache --zero-stats

      - name: Build source distribution
        run: |
          python -m build --sdist
        continue-on-error: true

      - name: Build wheel
        run: |
          python -m build --wheel
        continue-on-error: true

      - name: Install package
        run: |
          pip install -e ".[test]"
        continue-on-error: true

      - name: Show build info
        if: always()
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Homebrew prefix ==="
          brew --prefix
          echo "=== NSS location ==="
          brew --prefix nss
          echo "=== NSPR location ==="
          brew --prefix nspr
          echo "=== NSS version ==="
          pkg-config --modversion nss || echo "N/A"
          echo "=== NSPR version ==="
          pkg-config --modversion nspr || echo "N/A"
          echo "=== Installed packages ==="
          pip list
          echo "=== ccache statistics ==="
          ccache --show-stats

      - name: Run tests
        if: success()
        run: |
          pytest test/ -v --tb=short
        continue-on-error: true

  build-status-report:
    name: 'Build Status Report'
    runs-on: ubuntu-latest
    needs: [build-ubuntu, build-macos]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Report status
        run: |
          {
            echo "## Build Status Report"
            echo ""
            echo "### Ubuntu Build"
            echo "Status: ${{ needs.build-ubuntu.result }}"
            echo ""
            echo "### macOS Build"
            echo "Status: ${{ needs.build-macos.result }}"
            echo ""
            echo "### Notes"
            echo "- C extension compilation may fail with NSS 3.100+"
            echo "- See TODO.md Issue #1 for known compilation issues"
            echo "- Tests will be skipped if build fails"
          } >> "$GITHUB_STEP_SUMMARY"
