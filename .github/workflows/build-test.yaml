# Runs on a new pull request, performs build and runs tests
name: 'Python Build/Test'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches:
      - main
      - master
    paths:
      - '**'
      - '!.github/**'
      - '!.*'
      - '!tox.ini'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  python-build:
    name: 'Python Build'
    runs-on: 'ubuntu-latest'
    outputs:
      matrix_json: "${{ steps.python-build.outputs.matrix_json }}"
      artefact_name: "${{ steps.python-build.outputs.artefact_name }}"
      artefact_path: "${{ steps.python-build.outputs.artefact_path }}"
    permissions:
      contents: read
    timeout-minutes: 12
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2  # v2.13.2
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Build NSS/NSPR from source
        run: |
          set -e

          # Install build dependencies
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            zlib1g-dev \
            libsqlite3-dev \
            gyp \
            ninja-build \
            wget

          # Create build directory
          mkdir -p ~/nss-build
          cd ~/nss-build

          # Download and extract NSS 3.104
          NSS_VERSION="3.104"
          NSS_URL="https://ftp.mozilla.org/pub/security/nss/releases"
          NSS_FILE="nss-${NSS_VERSION}.tar.gz"
          wget -q "${NSS_URL}/NSS_${NSS_VERSION//./_}_RTM/src/${NSS_FILE}"
          tar -xzf "${NSS_FILE}"

          # Download and extract NSPR 4.35
          NSPR_VERSION="4.35"
          NSPR_URL="https://ftp.mozilla.org/pub/nspr/releases"
          NSPR_FILE="nspr-${NSPR_VERSION}.tar.gz"
          wget -q "${NSPR_URL}/v${NSPR_VERSION}/src/${NSPR_FILE}"
          tar -xzf "${NSPR_FILE}"

          # Build NSPR
          cd "nspr-${NSPR_VERSION}/nspr"
          ./configure --prefix=/usr/local \
            --with-mozilla --with-pthreads --enable-64bit
          make -j"$(nproc)"
          sudo make install

          # Build NSS
          cd ~/nss-build/nss-${NSS_VERSION}/nss
          make -j"$(nproc)" \
            BUILD_OPT=1 \
            USE_64=1 \
            NSS_USE_SYSTEM_SQLITE=1 \
            NSPR_INCLUDE_DIR=/usr/local/include/nspr \
            NSPR_LIB_DIR=/usr/local/lib

          # Install NSS
          cd ../dist
          NSS_DIST_DIR=$(find . -maxdepth 1 -type d -name "Linux*" | head -1)
          sudo mkdir -p /usr/local/include/nss
          sudo cp -r "${NSS_DIST_DIR}"/include/* /usr/local/include/nss/
          sudo cp -L "${NSS_DIST_DIR}"/lib/*.so /usr/local/lib/
          sudo cp -L "${NSS_DIST_DIR}"/bin/* /usr/local/bin/
          sudo ldconfig

          # Create pkg-config files
          sudo tee /usr/local/lib/pkgconfig/nss.pc > /dev/null <<EOF
          prefix=/usr/local
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include/nss

          Name: NSS
          Description: Network Security Services
          Version: ${NSS_VERSION}
          Requires: nspr >= ${NSPR_VERSION}
          Libs: -L\${libdir} -lssl3 -lsmime3 -lnss3 -lnssutil3
          Cflags: -I\${includedir}
          EOF

          sudo tee /usr/local/lib/pkgconfig/nspr.pc > /dev/null <<EOF
          prefix=/usr/local
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include/nspr

          Name: NSPR
          Description: Netscape Portable Runtime
          Version: ${NSPR_VERSION}
          Libs: -L\${libdir} -lplds4 -lplc4 -lnspr4
          Cflags: -I\${includedir}
          EOF

          # Set PKG_CONFIG_PATH for subsequent steps
          PKG_PATH="/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=${PKG_PATH}" >> "$GITHUB_ENV"
          LD_PATH="/usr/local/lib:$LD_LIBRARY_PATH"
          echo "LD_LIBRARY_PATH=${LD_PATH}" >> "$GITHUB_ENV"

          # Verify installation
          pkg-config --modversion nss
          pkg-config --modversion nspr

      - name: 'Build Python project'
        id: python-build
        # yamllint disable-line rule:line-length
        uses: modeseven-lfreleng-actions/python-build-action@refactor-build-action  # Testing

  python-tests:
    name: 'Python Tests'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    # Matrix job
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2  # v2.13.2
        with:
          egress-policy: audit

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Build NSS/NSPR from source
        run: |
          set -e

          # Install build dependencies
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            zlib1g-dev \
            libsqlite3-dev \
            gyp \
            ninja-build \
            wget

          # Create build directory
          mkdir -p ~/nss-build
          cd ~/nss-build

          # Download and extract NSS 3.104
          NSS_VERSION="3.104"
          NSS_URL="https://ftp.mozilla.org/pub/security/nss/releases"
          NSS_FILE="nss-${NSS_VERSION}.tar.gz"
          wget -q "${NSS_URL}/NSS_${NSS_VERSION//./_}_RTM/src/${NSS_FILE}"
          tar -xzf "${NSS_FILE}"

          # Download and extract NSPR 4.35
          NSPR_VERSION="4.35"
          NSPR_URL="https://ftp.mozilla.org/pub/nspr/releases"
          NSPR_FILE="nspr-${NSPR_VERSION}.tar.gz"
          wget -q "${NSPR_URL}/v${NSPR_VERSION}/src/${NSPR_FILE}"
          tar -xzf "${NSPR_FILE}"

          # Build NSPR
          cd "nspr-${NSPR_VERSION}/nspr"
          ./configure --prefix=/usr/local \
            --with-mozilla --with-pthreads --enable-64bit
          make -j"$(nproc)"
          sudo make install

          # Build NSS
          cd ~/nss-build/nss-${NSS_VERSION}/nss
          make -j"$(nproc)" \
            BUILD_OPT=1 \
            USE_64=1 \
            NSS_USE_SYSTEM_SQLITE=1 \
            NSPR_INCLUDE_DIR=/usr/local/include/nspr \
            NSPR_LIB_DIR=/usr/local/lib

          # Install NSS
          cd ../dist
          NSS_DIST_DIR=$(find . -maxdepth 1 -type d -name "Linux*" | head -1)
          sudo mkdir -p /usr/local/include/nss
          sudo cp -r "${NSS_DIST_DIR}"/include/* /usr/local/include/nss/
          sudo cp -L "${NSS_DIST_DIR}"/lib/*.so /usr/local/lib/
          sudo cp -L "${NSS_DIST_DIR}"/bin/* /usr/local/bin/
          sudo ldconfig

          # Create pkg-config files
          sudo tee /usr/local/lib/pkgconfig/nss.pc > /dev/null <<EOF
          prefix=/usr/local
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include/nss

          Name: NSS
          Description: Network Security Services
          Version: ${NSS_VERSION}
          Requires: nspr >= ${NSPR_VERSION}
          Libs: -L\${libdir} -lssl3 -lsmime3 -lnss3 -lnssutil3
          Cflags: -I\${includedir}
          EOF

          sudo tee /usr/local/lib/pkgconfig/nspr.pc > /dev/null <<EOF
          prefix=/usr/local
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include/nspr

          Name: NSPR
          Description: Netscape Portable Runtime
          Version: ${NSPR_VERSION}
          Libs: -L\${libdir} -lplds4 -lplc4 -lnspr4
          Cflags: -I\${includedir}
          EOF

          # Set PKG_CONFIG_PATH for subsequent steps
          PKG_PATH="/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=${PKG_PATH}" >> "$GITHUB_ENV"
          LD_PATH="/usr/local/lib:$LD_LIBRARY_PATH"
          echo "LD_LIBRARY_PATH=${LD_PATH}" >> "$GITHUB_ENV"

          # Verify installation
          pkg-config --modversion nss
          pkg-config --modversion nspr

      - name: "Python tests [pytest] ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@b997656111c9b547f8458b18baf6be139e2d2c6c  # v0.1.12
        with:
          python_version: ${{ matrix.python-version }}

  python-audit:
    name: 'Python Audit'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    # Matrix job
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2  # v2.13.2
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: "Audit dependencies ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-audit-action@d2a271bdbf08572dbd8addd3358e5e937ab3739b  # v0.2.3
        with:
          python_version: "${{ matrix.python-version }}"

  sbom:
    name: 'Generate SBOM'
    runs-on: ubuntu-latest
    needs: 'python-build'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: "Generate SBOM"
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-sbom-action@ae4aca2ef28d7da4ec95049cc78be43e632d322a  # v0.1.0
        with:
          include_dev: "false"
          sbom_format: "both"

      - name: "Upload SBOM artifacts"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        with:
          name: sbom-files
          path: |
            sbom-cyclonedx.json
            sbom-cyclonedx.xml
          retention-days: 45

      - name: "Security scan with Grype (SARIF)"
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action@3aaf50d765cfcceafa51d322ccb790e40f6cd8c5  # v7.2.0
        id: grype-sarif
        with:
          sbom: "${{ steps.sbom.outputs.sbom_json_path }}"
          output-format: "sarif"
          output-file: "grype-results.sarif"
          fail-build: "true"

      - name: "Security scan with Grype (Text/Table)"
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action@3aaf50d765cfcceafa51d322ccb790e40f6cd8c5  # v7.2.0
        id: grype-table
        if: always()
        with:
          sbom: "${{ steps.sbom.outputs.sbom_json_path }}"
          output-format: "table"
          output-file: "grype-results.txt"
          fail-build: "false"

      - name: "Upload Grype scan results"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        if: always()
        with:
          name: grype-scan-results
          path: |
            grype-results.sarif
            grype-results.txt
          retention-days: 90

      - name: "Grype summary"
        if: always()
        run: |
            # Grype summary
            echo "## Grype Summary" >> "$GITHUB_STEP_SUMMARY"
            [ -f grype-results.txt ] && cat grype-results.txt \
              >> "$GITHUB_STEP_SUMMARY" || echo "No scan results available" \
              >> "$GITHUB_STEP_SUMMARY"
